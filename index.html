<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krima's Iced Chains</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(26,26,26,0.8);
            --card-border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #f5a623;
            --accent-glow: rgba(245,166,35,0.3);
            --accent-hover: #e09515;
            --price-color: #4CAF50;
            --header-bg-start: #0a0a0a;
            --header-bg-end: #1a1a1a;
            --modal-bg: rgba(20,20,20,0.95);
            --input-bg: rgba(30,30,30,0.8);
            --input-border: rgba(255,255,255,0.12);
            --success-color: #4CAF50;
            --glass-blur: blur(20px);
            --card-radius: 16px;
            --gradient-1: #f5a623;
            --gradient-2: #e09515;
            --gradient-3: #c8a44e;
        }

        .theme-dark-gold { --bg: #000000; --card-bg: rgba(26,26,26,0.75); --card-border: rgba(255,255,255,0.08); --text: #ffffff; --text-secondary: #a0a0a0; --accent: #f5a623; --accent-glow: rgba(245,166,35,0.3); --accent-hover: #e09515; --price-color: #4CAF50; --header-bg-start: #0a0a0a; --header-bg-end: #1a1a1a; --modal-bg: rgba(20,20,20,0.95); --input-bg: rgba(30,30,30,0.8); --input-border: rgba(255,255,255,0.12); --success-color: #4CAF50; --gradient-1: #f5a623; --gradient-2: #e09515; --gradient-3: #c8a44e; }
        .theme-iced-blue { --bg: #060d18; --card-bg: rgba(14,22,40,0.75); --card-border: rgba(0,212,255,0.15); --text: #e8f0ff; --text-secondary: #8899bb; --accent: #00d4ff; --accent-glow: rgba(0,212,255,0.3); --accent-hover: #00b0d6; --price-color: #00e5ff; --header-bg-start: #050a14; --header-bg-end: #0d1a2d; --modal-bg: rgba(10,16,28,0.95); --input-bg: rgba(16,26,44,0.8); --input-border: rgba(0,212,255,0.15); --success-color: #00e5ff; --gradient-1: #00d4ff; --gradient-2: #0098cc; --gradient-3: #00b8e6; }
        .theme-luxury-white { --bg: #f5f5f0; --card-bg: rgba(255,255,255,0.85); --card-border: rgba(200,164,78,0.2); --text: #1a1a1a; --text-secondary: #777777; --accent: #c8a44e; --accent-glow: rgba(200,164,78,0.25); --accent-hover: #b8923a; --price-color: #2d7a2d; --header-bg-start: #fafaf7; --header-bg-end: #f0ebe0; --modal-bg: rgba(255,255,255,0.95); --input-bg: rgba(245,245,240,0.9); --input-border: rgba(200,164,78,0.3); --success-color: #2d7a2d; --gradient-1: #c8a44e; --gradient-2: #d4b86a; --gradient-3: #b8923a; }
        .theme-forest-green { --bg: #0a120a; --card-bg: rgba(16,28,16,0.75); --card-border: rgba(76,175,80,0.15); --text: #e0f0e0; --text-secondary: #88aa88; --accent: #4CAF50; --accent-glow: rgba(76,175,80,0.3); --accent-hover: #3d8b40; --price-color: #66d966; --header-bg-start: #080e08; --header-bg-end: #0f1f0f; --modal-bg: rgba(12,20,12,0.95); --input-bg: rgba(18,30,18,0.8); --input-border: rgba(76,175,80,0.15); --success-color: #66d966; --gradient-1: #4CAF50; --gradient-2: #66d966; --gradient-3: #3d8b40; }
        .theme-royal-purple { --bg: #0c0814; --card-bg: rgba(22,16,36,0.75); --card-border: rgba(168,85,247,0.15); --text: #f0e8ff; --text-secondary: #b099d0; --accent: #a855f7; --accent-glow: rgba(168,85,247,0.3); --accent-hover: #9333ea; --price-color: #c084fc; --header-bg-start: #0a0612; --header-bg-end: #140f20; --modal-bg: rgba(16,10,28,0.95); --input-bg: rgba(24,16,40,0.8); --input-border: rgba(168,85,247,0.15); --success-color: #a855f7; --gradient-1: #a855f7; --gradient-2: #c084fc; --gradient-3: #9333ea; }
        .theme-sunset-coral { --bg: #160c08; --card-bg: rgba(32,18,12,0.75); --card-border: rgba(255,107,74,0.15); --text: #fff0ec; --text-secondary: #c8a098; --accent: #ff6b4a; --accent-glow: rgba(255,107,74,0.3); --accent-hover: #e55a3a; --price-color: #ff8c6e; --header-bg-start: #100804; --header-bg-end: #1c100c; --modal-bg: rgba(24,14,10,0.95); --input-bg: rgba(34,20,14,0.8); --input-border: rgba(255,107,74,0.15); --success-color: #ff6b4a; --gradient-1: #ff6b4a; --gradient-2: #ff8c6e; --gradient-3: #e55a3a; }
        .theme-midnight-silver { --bg: #070a0f; --card-bg: rgba(16,22,30,0.75); --card-border: rgba(192,200,208,0.12); --text: #e8edf2; --text-secondary: #8899a8; --accent: #c0c8d0; --accent-glow: rgba(192,200,208,0.25); --accent-hover: #a8b0b8; --price-color: #80b8e0; --header-bg-start: #05080c; --header-bg-end: #0c1018; --modal-bg: rgba(12,16,22,0.95); --input-bg: rgba(18,24,32,0.8); --input-border: rgba(192,200,208,0.12); --success-color: #80b8e0; --gradient-1: #c0c8d0; --gradient-2: #d8dfe5; --gradient-3: #a8b0b8; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.5s ease, color 0.5s ease; overflow-x: hidden; }

        .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.4; }
        .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }

        .header { background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-1)); background-size: 400% 400%; animation: gradientShift 8s ease infinite; padding: 30px 20px 25px; text-align: center; position: relative; z-index: 10; }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .header::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.55); z-index: 0; }
        .header > * { position: relative; z-index: 1; }
        .header-badge { display: inline-block; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.75em; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.2); }
        .header h1 { font-size: 2.2em; font-weight: 800; color: #fff; letter-spacing: 1px; text-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .header p { color: rgba(255,255,255,0.85); font-size: 0.85em; font-weight: 500; margin-top: 5px; letter-spacing: 0.5px; }

        .settings-btn { position: absolute; top: 18px; right: 18px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 42px; height: 42px; border-radius: 50%; font-size: 1.2em; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .settings-btn:hover { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.3); transform: rotate(90deg); }

        .trust-bar { background: var(--card-bg); border-bottom: 1px solid var(--card-border); padding: 10px 20px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; z-index: 5; position: relative; backdrop-filter: var(--glass-blur); }
        .trust-item { display: flex; align-items: center; gap: 8px; font-size: 0.75em; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.5px; }
        .trust-item .icon { font-size: 1.2em; }

        .tabs-container { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--card-border); backdrop-filter: var(--glass-blur); padding: 0; }
        .tabs { display: flex; justify-content: center; gap: 0; max-width: 600px; margin: 0 auto; }
        .tab { flex: 1; text-align: center; padding: 14px 10px; cursor: pointer; font-weight: 600; font-size: 0.82em; color: var(--text-secondary); border: none; background: transparent; transition: all 0.3s ease; letter-spacing: 0.5px; text-transform: uppercase; position: relative; font-family: 'Montserrat', sans-serif; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: var(--accent); border-radius: 3px 3px 0 0; box-shadow: 0 0 10px var(--accent-glow); }
        .tab .count { font-size: 0.7em; background: var(--card-bg); padding: 2px 8px; border-radius: 10px; margin-left: 4px; border: 1px solid var(--card-border); }

        .section-title { text-align: center; padding: 20px 20px 5px; font-size: 0.8em; text-transform: uppercase; letter-spacing: 3px; color: var(--text-secondary); z-index: 5; position: relative; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 24px; padding: 15px 24px 30px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 5; }
        .product-card { background: var(--card-bg); border-radius: var(--card-radius); overflow: hidden; border: 1px solid var(--card-border); backdrop-filter: var(--glass-blur); position: relative; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); animation: fadeInUp 0.5s ease forwards; opacity: 0; display: block; }
        .product-card.hidden { display: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 0 1px var(--accent); border-color: var(--accent); }
        .product-card .img-wrap { position: relative; overflow: hidden; height: 260px; cursor: pointer; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover img { transform: scale(1.08); }
        .img-wrap .zoom-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 2.5em; opacity: 0; transition: all 0.3s ease; z-index: 3; pointer-events: none; text-shadow: 0 0 20px rgba(0,0,0,0.6); }
        .product-card .img-wrap:hover .zoom-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .product-card .img-wrap::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, var(--card-bg)); pointer-events: none; z-index: 2; }
        .badge { position: absolute; top: 12px; left: 12px; padding: 5px 12px; border-radius: 20px; font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; z-index: 4; }
        .badge-hot { background: #ff4444; color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); } 50% { box-shadow: 0 0 0 15px transparent; } }
        .badge-new { background: var(--accent); color: #000; }
        .badge-value { background: #4CAF50; color: #fff; }
        .product-info { padding: 16px 18px 18px; }
        .product-info h3 { color: var(--text); font-size: 1em; font-weight: 600; margin-bottom: 6px; }
        .price-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .price { font-size: 1.4em; font-weight: 800; color: var(--price-color); }
        .order-btn { width: 100%; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-size: 0.9em; font-weight: 700; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s ease; letter-spacing: 0.5px; text-transform: uppercase; }
        .order-btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
        .order-btn:hover::before { width: 300px; height: 300px; }
        .order-btn:hover { box-shadow: 0 8px 25px var(--accent-glow); transform: translateY(-2px); }
        .order-btn:active { transform: scale(0.97); }

        .image-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 4000; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(10px); }
        .image-viewer.active { display: flex; }
        .image-viewer img { max-width: 92%; max-height: 90vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); object-fit: contain; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .image-viewer .close-viewer { position: absolute; top: 20px; right: 25px; color: #fff; font-size: 2em; cursor: pointer; z-index: 4001; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; transition: all 0.3s ease; }
        .image-viewer .close-viewer:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--modal-bg); padding: 28px; border-radius: var(--card-radius); max-width: 420px; width: 92%; border: 1px solid var(--card-border); backdrop-filter: var(--glass-blur); animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-content h2 { color: var(--accent); margin-bottom: 12px; text-align: center; font-weight: 700; }
        .modal-content label { display: block; margin: 12px 0 5px; color: var(--text-secondary); font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .modal-content input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 0.95em; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; }
        .modal-content input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px var(--accent-glow); }
        .submit-btn { width: 100%; padding: 14px; background: var(--success-color); color: #fff; border: none; border-radius: 10px; font-size: 0.95em; font-weight: 700; margin-top: 18px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.3s ease; }
        .submit-btn:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.3); transform: translateY(-2px); }
        .close-btn { width: 100%; padding: 11px; background: transparent; color: var(--text-secondary); border: 1px solid var(--card-border); border-radius: 10px; margin-top: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
        .close-btn:hover { color: var(--text); border-color: var(--text-secondary); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--success-color); color: #fff; padding: 14px 28px; border-radius: 30px; font-weight: 600; z-index: 5000; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); font-size: 0.9em; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .theme-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1999; backdrop-filter: blur(4px); }
        .theme-overlay.show { display: block; }
        .theme-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--modal-bg); border-left: 1px solid var(--card-border); z-index: 2000; padding: 20px; overflow-y: auto; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: var(--glass-blur); }
        .theme-panel.open { right: 0; }
        .theme-panel h3 { color: var(--accent); margin-bottom: 15px; font-size: 1.1em; text-align: center; font-weight: 700; }
        .theme-option { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 6px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; background: var(--input-bg); color: var(--text); font-weight: 500; transition: all 0.3s ease; }
        .theme-option:hover { border-color: var(--accent); transform: translateX(-4px); }
        .theme-option.active { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .theme-swatch { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.15); }
        .close-panel { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 8px; font-size: 0.9em; transition: all 0.3s ease; }
        .close-panel:hover { box-shadow: 0 0 20px var(--accent-glow); }

        .whatsapp-float { position: fixed; bottom: 28px; right: 28px; background: #25D366; color: #fff; width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6em; text-decoration: none; box-shadow: 0 8px 25px rgba(37,211,102,0.4); z-index: 999; transition: all 0.3s ease; }
        .whatsapp-float:hover { transform: scale(1.1); box-shadow: 0 12px 35px rgba(37,211,102,0.5); }
        .whatsapp-float::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 2px solid rgba(37,211,102,0.4); animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% { inset: -6px; opacity: 1; } 100% { inset: -20px; opacity: 0; } }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.5em; }
            .theme-panel { width: 85%; }
            .products { grid-template-columns: 1fr; padding: 10px 14px; gap: 16px; }
            .product-card .img-wrap { height: 230px; }
            .trust-bar { gap: 16px; padding: 8px 12px; }
            .trust-item { font-size: 0.7em; gap: 4px; }
            .tab { font-size: 0.7em; padding: 12px 6px; }
        }
    </style>
</head>
<body class="theme-dark-gold">

    <div class="bg-particles" id="bgParticles"></div>
    <div class="theme-overlay" id="themeOverlay" onclick="closeThemePanel()"></div>

    <div class="theme-panel" id="themePanel">
        <h3>🎨 Choose Theme</h3>
        <div class="theme-option active" onclick="setTheme('theme-dark-gold', this)"><div class="theme-swatch" style="background:linear-gradient(135deg, #1a1a1a, #f5a623);"></div><span>Dark & Gold</span></div>
        <div class="theme-option" onclick="setTheme('theme-iced-blue', this)"><div class="theme-swatch" style="background:linear-gradient(135deg, #0d1a2d, #00d4ff);"></div><span>Iced Blue</span></div>
        <div class="theme-option" onclick="setTheme('theme-luxury-white', this)"><div class="theme-swatch" style="background:linear-gradient(135deg, #ffffff, #c8a44e);"></div><span>Luxury White & Gold</span></div>
        <div class="theme-option" onclick="setTheme('theme-forest-green', this)"><div class="theme-swatch" style="background:linear-gradient(135deg, #142214, #4CAF50);"></div><span>Forest Green</span></div>
        <div class="theme-option" onclick="setTheme('theme-royal-purple', this)"><div class="theme-swatch" style="background:linear-gradient(135deg, #1a1128, #a855f7);"></div><span>Royal Purple</span></div>
        <div class="theme-option" onclick="setTheme('theme-sunset-coral', this)"><div class="theme-swatch" style="background:linear-gradient(135deg, #241410, #ff6b4a);"></div><span>Sunset Coral</span></div>
        <div class="theme-option" onclick="setTheme('theme-midnight-silver', this)"><div class="theme-swatch" style="background:linear-gradient(135deg, #121820, #c0c8d0);"></div><span>Midnight Silver</span></div>
        <button class="close-panel" onclick="closeThemePanel()">✕ Close</button>
    </div>

    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <span class="close-viewer">&times;</span>
        <img src="" alt="Product Image" id="viewerImage">
    </div>

    <div class="header">
        <button class="settings-btn" onclick="openThemePanel()" title="Change Theme">⚙️</button>
        <div class="header-badge">✦ Premium Collection ✦</div>
        <h1>💎 Krima's Iced Chains</h1>
        <p>Premium Cuban Chains, Bracelets & Watches</p>
    </div>

    <div class="trust-bar">
        <div class="trust-item"><span class="icon">✅</span> 100% Authentic</div>
        <div class="trust-item"><span class="icon">⭐</span> Premium Quality</div>
        <div class="trust-item"><span class="icon">💬</span> Instant WhatsApp Support</div>
    </div>

    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" onclick="filterProducts('all', this)">All<span class="count">8</span></button>
            <button class="tab" onclick="filterProducts('chain', this)">Chains<span class="count">4</span></button>
            <button class="tab" onclick="filterProducts('bracelet', this)">Bracelets<span class="count">3</span></button>
            <button class="tab" onclick="filterProducts('set', this)">Sets<span class="count">1</span></button>
        </div>
    </div>

    <div class="products" id="productsContainer"></div>

    <div class="modal" id="orderModal"><div class="modal-content" id="modalContent"></div></div>

    <div class="toast" id="toast">✅ Order Sent Successfully!</div>

    <a href="https://wa.me/254722621818" target="_blank" class="whatsapp-float" title="Chat on WhatsApp">💬</a>

    <script>
        const products = [
            { name: "Cuban Gold Chain", price: 1000, image: "chain1.jpg", category: "chain", badge: "hot", badgeText: "🔥 Bestseller" },
            { name: "Cuban Silver Chain", price: 1000, image: "chain2.jpg", category: "chain", badge: "new", badgeText: "✨ New" },
            { name: "Cuban Blue Ice Chain", price: 1000, image: "chain3.jpg", category: "chain", badge: "value", badgeText: "💎 Value Pick" },
            { name: "Cuban Gold Bracelet", price: 800, image: "chain4.jpg", category: "bracelet", badge: "hot", badgeText: "🔥 Popular" },
            { name: "Cuban Iced Set", price: 1999, image: "chain5.jpg", category: "set", badge: "new", badgeText: "⭐ Premium Set" },
            { name: "Cuban Iced Bracelet", price: 800, image: "chain6.jpg", category: "bracelet", badge: "new", badgeText: "✨ New" },
            { name: "Cuban Golden Iced Chain", price: 1000, image: "chain7.jpg", category: "chain", badge: "hot", badgeText: "🔥 Trending" },
            { name: "Cuban Silver Bracelet", price: 800, image: "chain8.jpg", category: "bracelet", badge: "new", badgeText: "✨ New" }
        ];

        const container = document.getElementById('productsContainer');
        const badgeClasses = { hot: 'badge-hot', new: 'badge-new', value: 'badge-value' };

        function renderProducts(filter = 'all') {
            container.innerHTML = '';
            products.forEach((p, i) => {
                if (filter !== 'all' && p.category !== filter) return;
                const badgeHTML = p.badge ? `<span class="badge ${badgeClasses[p.badge]}">${p.badgeText}</span>` : '';
                const card = document.createElement('div');
                card.className = 'product-card';
                card.setAttribute('data-category', p.category);
                card.innerHTML = `
                    <div class="img-wrap" onclick="openImageViewer('${p.image}')">
                        ${badgeHTML}
                        <div class="zoom-icon">🔍</div>
                        <img src="${p.image}" alt="${p.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="price-row"><span class="price">KES ${p.price.toLocaleString()}</span></div>
                        <button class="order-btn" onclick="event.stopPropagation(); openOrder(${i})">🛒 Order Now</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterProducts(category, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderProducts(category);
        }

        renderProducts();

        function openImageViewer(imageSrc) {
            document.getElementById('viewerImage').src = imageSrc;
            document.getElementById('imageViewer').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeImageViewer() {
            document.getElementById('imageViewer').classList.remove('active');
            document.body.style.overflow = '';
        }

        function openOrder(index) {
            const p = products[index];
            document.getElementById('modalContent').innerHTML = `
                <h2>Place Your Order</h2>
                <p style="color:var(--accent);margin-bottom:8px;text-align:center;font-weight:600;">${p.name} — KES ${p.price.toLocaleString()}</p>
                <label>Your Full Name *</label>
                <input type="text" id="custName" placeholder="e.g. Brian Mwangi" required autocomplete="name">
                <label>Your Phone Number *</label>
                <input type="tel" id="custPhone" placeholder="e.g. 0712345678" required autocomplete="tel">
                <label>Pickup Location (Nairobi area) *</label>
                <input type="text" id="pickupLoc" placeholder="e.g. CBD, Moi Avenue" required autocomplete="off">
                <button class="submit-btn" onclick="submitOrder('${p.name}', ${p.price})">📩 Send Order to WhatsApp</button>
                <button class="close-btn" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('orderModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
            document.body.style.overflow = '';
        }
        function submitOrder(productName, price) {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const location = document.getElementById('pickupLoc').value.trim();
            if (!name || !phone || !location) { showToast('⚠️ Please fill in all fields'); return; }
            const message = `🛒 *New Order — Krima's Iced Chains*%0A%0A👤 *Customer:* ${name}%0A📞 *Phone:* ${phone}%0A💎 *Item:* ${productName}%0A💰 *Price:* KES ${price.toLocaleString()}%0A📍 *Pickup:* ${location}`;
            window.open(`https://wa.me/254722621818?text=${message}`, '_blank');
            closeModal();
            showToast('✅ Order Sent! I will reach out shortly.');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function openThemePanel() { document.getElementById('themePanel').classList.add('open'); document.getElementById('themeOverlay').classList.add('show'); }
        function closeThemePanel() { document.getElementById('themePanel').classList.remove('open'); document.getElementById('themeOverlay').classList.remove('show'); }
        function setTheme(themeClass, el) {
            document.body.className = themeClass;
            document.querySelectorAll('.theme-option').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            localStorage.setItem('krima-theme', themeClass);
            createParticles();
        }
        const saved = localStorage.getItem('krima-theme');
        if (saved) { document.body.className = saved; document.querySelectorAll('.theme-option').forEach(el => { el.classList.remove('active'); if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(saved)) el.classList.add('active'); }); }

        function createParticles() {
            const pc = document.getElementById('bgParticles');
            pc.innerHTML = '';
            const colors = ['#f5a623', '#4CAF50', '#ffffff', '#00d4ff', '#a855f7', '#ff6b4a'];
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (Math.random() * 12 + 8) + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.opacity = Math.random() * 0.4 + 0.1;
                pc.appendChild(p);
            }
        }
        createParticles();

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { closeModal(); closeThemePanel(); closeImageViewer(); }
        });
    </script>
</body>
</html>
