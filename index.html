<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krima's Iced Chains</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --card-border: #333333;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --accent: #f5a623;
            --accent-hover: #e09515;
            --price-color: #4CAF50;
            --header-bg-start: #1a1a1a;
            --header-bg-end: #333333;
            --modal-bg: #1a1a1a;
            --input-bg: #2a2a2a;
            --input-border: #555555;
            --success-color: #4CAF50;
        }

        /* ----- THEMES ----- */
        .theme-dark-gold { --bg: #000000; --card-bg: #1a1a1a; --card-border: #333333; --text: #ffffff; --text-secondary: #cccccc; --accent: #f5a623; --accent-hover: #e09515; --price-color: #4CAF50; --header-bg-start: #1a1a1a; --header-bg-end: #333333; --modal-bg: #1a1a1a; --input-bg: #2a2a2a; --input-border: #555555; --success-color: #4CAF50; }
        .theme-iced-blue { --bg: #0a0a0f; --card-bg: #111122; --card-border: #1e3a5f; --text: #e8f0ff; --text-secondary: #a0bcd8; --accent: #00d4ff; --accent-hover: #00b0d6; --price-color: #00e5ff; --header-bg-start: #0d1a2d; --header-bg-end: #112240; --modal-bg: #111122; --input-bg: #1a1a2e; --input-border: #1e3a5f; --success-color: #00e5ff; }
        .theme-luxury-white { --bg: #f5f5f0; --card-bg: #ffffff; --card-border: #e0d5c0; --text: #1a1a1a; --text-secondary: #666666; --accent: #c8a44e; --accent-hover: #b8923a; --price-color: #2d7a2d; --header-bg-start: #ffffff; --header-bg-end: #f0ebe0; --modal-bg: #ffffff; --input-bg: #f9f9f9; --input-border: #d5c9b0; --success-color: #2d7a2d; }
        .theme-forest-green { --bg: #0d1a0d; --card-bg: #142214; --card-border: #2a4a2a; --text: #e8f0e8; --text-secondary: #a0c0a0; --accent: #4CAF50; --accent-hover: #3d8b40; --price-color: #66d966; --header-bg-start: #0f1f0f; --header-bg-end: #1a331a; --modal-bg: #142214; --input-bg: #1a2e1a; --input-border: #2a4a2a; --success-color: #66d966; }
        .theme-royal-purple { --bg: #0e0a14; --card-bg: #1a1128; --card-border: #3a2560; --text: #f0e8ff; --text-secondary: #c0a8e0; --accent: #a855f7; --accent-hover: #9333ea; --price-color: #c084fc; --header-bg-start: #140f20; --header-bg-end: #1e1430; --modal-bg: #1a1128; --input-bg: #221638; --input-border: #3a2560; --success-color: #a855f7; }
        .theme-sunset-coral { --bg: #1a0e0a; --card-bg: #241410; --card-border: #4a2820; --text: #fff0ec; --text-secondary: #d4a898; --accent: #ff6b4a; --accent-hover: #e55a3a; --price-color: #ff8c6e; --header-bg-start: #1c100c; --header-bg-end: #2a1814; --modal-bg: #241410; --input-bg: #2e1c16; --input-border: #4a2820; --success-color: #ff6b4a; }
        .theme-midnight-silver { --bg: #080c10; --card-bg: #121820; --card-border: #2a3540; --text: #e8edf2; --text-secondary: #8a9ba8; --accent: #c0c8d0; --accent-hover: #a8b0b8; --price-color: #80b8e0; --header-bg-start: #0c1018; --header-bg-end: #161e28; --modal-bg: #121820; --input-bg: #1a222c; --input-border: #2a3540; --success-color: #80b8e0; }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.4s, color 0.4s, border-color 0.4s, box-shadow 0.4s; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* HEADER */
        .header { background: linear-gradient(135deg, var(--header-bg-start), var(--header-bg-end)); padding: 25px 20px; text-align: center; border-bottom: 3px solid var(--accent); position: relative; }
        .header h1 { font-size: 2em; color: var(--accent); margin-bottom: 5px; letter-spacing: 1px; }
        .header p { color: var(--text-secondary); font-size: 0.9em; }

        /* SETTINGS ICON */
        .settings-btn { position: absolute; top: 15px; right: 15px; background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text); width: 40px; height: 40px; border-radius: 50%; font-size: 1.3em; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .settings-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* THEME PANEL */
        .theme-panel { display: none; position: fixed; top: 0; right: 0; width: 300px; height: 100%; background: var(--card-bg); border-left: 1px solid var(--card-border); z-index: 2000; padding: 20px; overflow-y: auto; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        .theme-panel.open { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .theme-panel h3 { color: var(--accent); margin-bottom: 15px; font-size: 1.2em; text-align: center; }
        .theme-option { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; background: var(--input-bg); color: var(--text); }
        .theme-option:hover { border-color: var(--accent); }
        .theme-option.active { border-color: var(--accent); }
        .theme-swatch { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.2); }
        .theme-option span { font-size: 0.9em; font-weight: 500; }
        .theme-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; }
        .theme-overlay.show { display: block; }
        .close-panel { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.95em; }
        .close-panel:hover { opacity: 0.9; }

        /* PRODUCTS */
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border); transition: transform 0.3s, box-shadow 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-info h3 { color: var(--accent); margin-bottom: 8px; font-size: 1.1em; }
        .product-info .price { font-size: 1.3em; font-weight: bold; color: var(--price-color); margin-bottom: 12px; }
        .order-btn { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; transition: opacity 0.3s, transform 0.2s; }
        .order-btn:hover { opacity: 0.85; transform: scale(1.02); }
        .order-btn:active { transform: scale(0.98); }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--modal-bg); padding: 25px; border-radius: 12px; max-width: 400px; width: 90%; border: 1px solid var(--card-border); }
        .modal-content h2 { color: var(--accent); margin-bottom: 15px; text-align: center; }
        .modal-content label { display: block; margin: 10px 0 4px; color: var(--text-secondary); font-size: 0.9em; }
        .modal-content input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 1em; }
        .modal-content input:focus { border-color: var(--accent); outline: none; }
        .submit-btn { width: 100%; padding: 12px; background: var(--success-color); color: #fff; border: none; border-radius: 6px; font-size: 1em; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .submit-btn:hover { opacity: 0.9; }
        .close-btn { width: 100%; padding: 10px; background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); border-radius: 6px; margin-top: 8px; cursor: pointer; }

        /* SUCCESS */
        .success-msg { display: none; text-align: center; padding: 40px 20px; }
        .success-msg.active { display: block; }
        .success-msg h2 { color: var(--success-color); font-size: 2em; margin-bottom: 10px; }

        /* WHATSAPP FLOAT */
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background: #25D366; color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8em; text-decoration: none; box-shadow: 0 4px 15px rgba(37,211,102,0.4); z-index: 999; transition: transform 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1); }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.4em; }
            .theme-panel { width: 85%; }
            .products { grid-template-columns: 1fr; padding: 10px; }
        }
    </style>
</head>
<body class="theme-dark-gold">

    <!-- OVERLAY -->
    <div class="theme-overlay" id="themeOverlay" onclick="closeThemePanel()"></div>

    <!-- THEME PANEL -->
    <div class="theme-panel" id="themePanel">
        <h3>🎨 Choose Theme</h3>
        <div class="theme-option active" onclick="setTheme('theme-dark-gold', this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg, #1a1a1a, #f5a623);"></div>
            <span>Dark & Gold</span>
        </div>
        <div class="theme-option" onclick="setTheme('theme-iced-blue', this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg, #0d1a2d, #00d4ff);"></div>
            <span>Iced Blue</span>
        </div>
        <div class="theme-option" onclick="setTheme('theme-luxury-white', this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg, #ffffff, #c8a44e);"></div>
            <span>Luxury White & Gold</span>
        </div>
        <div class="theme-option" onclick="setTheme('theme-forest-green', this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg, #142214, #4CAF50);"></div>
            <span>Forest Green</span>
        </div>
        <div class="theme-option" onclick="setTheme('theme-royal-purple', this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg, #1a1128, #a855f7);"></div>
            <span>Royal Purple</span>
        </div>
        <div class="theme-option" onclick="setTheme('theme-sunset-coral', this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg, #241410, #ff6b4a);"></div>
            <span>Sunset Coral</span>
        </div>
        <div class="theme-option" onclick="setTheme('theme-midnight-silver', this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg, #121820, #c0c8d0);"></div>
            <span>Midnight Silver</span>
        </div>
        <button class="close-panel" onclick="closeThemePanel()">✕ Close</button>
    </div>

    <!-- HEADER -->
    <div class="header">
        <button class="settings-btn" onclick="openThemePanel()" title="Change Theme">⚙️</button>
        <h1>💎 Krima's Iced Chains</h1>
        <p>Premium Cuban Chains & Bracelets • Nairobi Pickup</p>
    </div>

    <!-- PRODUCTS -->
    <div class="products" id="productsContainer"></div>

    <!-- ORDER MODAL -->
    <div class="modal" id="orderModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- SUCCESS MESSAGE -->
    <div class="success-msg" id="successMsg">
        <h2>✅ Order Sent!</h2>
        <p>Thank you! I'll reach out on WhatsApp shortly to confirm your order.</p>
    </div>

    <!-- WHATSAPP FLOAT -->
    <a href="https://wa.me/254722621818" target="_blank" class="whatsapp-float" title="Chat on WhatsApp">💬</a>

    <script>
        const products = [
            { name: "Cuban Gold Chain", price: 1000, image: "chain1.jpg" },
            { name: "Cuban Silver Chain", price: 1000, image: "chain2.jpg" },
            { name: "Cuban Blue Ice Chain", price: 1000, image: "chain3.jpg" },
            { name: "Cuban Gold Bracelet", price: 800, image: "chain4.jpg" },
            { name: "Cuban Iced Set", price: 1999, image: "chain5.jpg" }
        ];

        const container = document.getElementById('productsContainer');
        products.forEach((p, i) => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="price">KES ${p.price.toLocaleString()}</div>
                        <button class="order-btn" onclick="openOrder(${i})">🛒 Order Now</button>
                    </div>
                </div>
            `;
        });

        function openOrder(index) {
            const p = products[index];
            document.getElementById('modalContent').innerHTML = `
                <h2>Place Your Order</h2>
                <p style="color:var(--accent);margin-bottom:10px;text-align:center;"><strong>${p.name}</strong> — KES ${p.price.toLocaleString()}</p>
                <label>Your Full Name *</label>
                <input type="text" id="custName" placeholder="e.g. Brian Mwangi" required>
                <label>Your Phone Number *</label>
                <input type="tel" id="custPhone" placeholder="e.g. 0712345678" required>
                <label>Pickup Location (Nairobi area) *</label>
                <input type="text" id="pickupLoc" placeholder="e.g. CBD, Moi Avenue" required>
                <button class="submit-btn" onclick="submitOrder('${p.name}', ${p.price})">📩 Send Order</button>
                <button class="close-btn" onclick="closeModal()">Cancel</button>
            `;
            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function submitOrder(productName, price) {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const location = document.getElementById('pickupLoc').value.trim();

            if (!name || !phone || !location) {
                alert('Please fill in all fields');
                return;
            }

            const message = `🛒 *New Order — Krima's Iced Chains*%0A%0A👤 *Customer:* ${name}%0A📞 *Phone:* ${phone}%0A💎 *Item:* ${productName}%0A💰 *Price:* KES ${price.toLocaleString()}%0A📍 *Pickup:* ${location}`;
            const whatsappURL = `https://wa.me/254722621818?text=${message}`;

            window.open(whatsappURL, '_blank');
            closeModal();
            document.getElementById('successMsg').classList.add('active');
            setTimeout(() => document.getElementById('successMsg').classList.remove('active'), 5000);
        }

        // THEME FUNCTIONS
        function openThemePanel() {
            document.getElementById('themePanel').classList.add('open');
            document.getElementById('themeOverlay').classList.add('show');
        }

        function closeThemePanel() {
            document.getElementById('themePanel').classList.remove('open');
            document.getElementById('themeOverlay').classList.remove('show');
        }

        function setTheme(themeClass, element) {
            document.body.className = themeClass;
            document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            localStorage.setItem('krima-theme', themeClass);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('krima-theme');
        if (savedTheme) {
            document.body.className = savedTheme;
            document.querySelectorAll('.theme-option').forEach(el => {
                el.classList.remove('active');
                if (el.getAttribute('onclick').includes(savedTheme)) {
                    el.classList.add('active');
                }
            });
        }

        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>

</body>
</html>
